<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portugal Squad Stats</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-6">

  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <img
        src="https://upload.wikimedia.org/wikipedia/en/5/5c/Portugal_national_football_team_logo.svg"
        class="w-28 h-28 mx-auto mb-4 bg-white rounded-full p-2"
        alt="Portugal Logo"
      />
      <h1 class="text-4xl font-bold text-red-500">Portugal National Team</h1>
      <p class="text-gray-400">Official Squad • Current Season Stats</p>
      <p class="text-green-400 mt-2">Formation: 4-3-3</p>
    </div>

    <div id="squad"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
    <div class="bg-zinc-900 p-6 rounded-2xl w-full max-w-lg relative">
      <button onclick="closeModal()" class="absolute right-4 top-4 bg-red-600 px-3 py-1 rounded">Close</button>

      <img id="pimg" class="w-32 h-32 mx-auto rounded-full border-4 border-green-500 mb-4" />
      <h2 id="pname" class="text-center text-3xl font-bold text-red-500"></h2>
      <p id="pclub" class="text-center text-gray-400 mb-4"></p>

      <div id="stats" class="grid grid-cols-2 gap-3"></div>
    </div>
  </div>

<script>

const squad = {

  "Goalkeepers": [
    {
      name: "Diogo Costa",
      club: "FC Porto",
      image: "https://upload.wikimedia.org/wikipedia/commons/3/3a/Diogo_Costa_2022.jpg",
      stats: { appearances: 42, cleanSheets: 18, saves: 112 }
    },
    {
      name: "José Sá",
      club: "Wolves",
      image: "https://upload.wikimedia.org/wikipedia/commons/5/5c/Jos%C3%A9_S%C3%A1_2022.jpg",
      stats: { appearances: 30, cleanSheets: 8, saves: 95 }
    },
    {
      name: "Rui Silva",
      club: "Real Betis",
      image: "https://upload.wikimedia.org/wikipedia/commons/2/2b/Rui_Silva_2021.jpg",
      stats: { appearances: 28, cleanSheets: 10, saves: 88 }
    }
  ],

  "Defenders": [
    {
      name: "Nuno Mendes",
      club: "PSG",
      image: "https://upload.wikimedia.org/wikipedia/commons/8/8a/Nuno_Mendes_2022.jpg",
      stats: { appearances: 35, assists: 5 }
    },
    {
      name: "João Cancelo",
      club: "Barcelona",
      image: "https://upload.wikimedia.org/wikipedia/commons/3/3a/Jo%C3%A3o_Cancelo_2022.jpg",
      stats: { appearances: 41, goals: 4 }
    },
    {
      name: "Rúben Dias",
      club: "Man City",
      image: "https://upload.wikimedia.org/wikipedia/commons/1/1b/Ruben_Dias_2021.jpg",
      stats: { appearances: 39, tackles: 74 }
    },
    {
      name: "Gonçalo Inácio",
      club: "Sporting",
      image: "https://upload.wikimedia.org/wikipedia/commons/4/4a/Gon%C3%A7alo_In%C3%A1cio_2023.jpg",
      stats: { appearances: 33, goals: 3 }
    }
  ],

  "Midfielders": [
    {
      name: "Vitinha",
      club: "PSG",
      image: "https://upload.wikimedia.org/wikipedia/commons/6/6a/Vitinha_2023.jpg",
      stats: { appearances: 44, assists: 5 }
    },
    {
      name: "Bruno Fernandes",
      club: "Man United",
      image: "https://upload.wikimedia.org/wikipedia/commons/9/9a/Bruno_Fernandes_2022.jpg",
      stats: { appearances: 48, goals: 14 }
    },
    {
      name: "Bernardo Silva",
      club: "Man City",
      image: "https://upload.wikimedia.org/wikipedia/commons/7/7a/Bernardo_Silva_2022.jpg",
      stats: { appearances: 45, assists: 7 }
    },
    {
      name: "João Neves",
      club: "Benfica",
      image: "https://upload.wikimedia.org/wikipedia/commons/1/1a/Jo%C3%A3o_Neves_2024.jpg",
      stats: { appearances: 30, tackles: 55 }
    }
  ],

  "Forwards": [
    {
      name: "Cristiano Ronaldo",
      club: "Al Nassr",
      image: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2023.jpg",
      stats: { goals: 38, assists: 11 }
    },
    {
      name: "João Félix",
      club: "Barcelona",
      image: "https://upload.wikimedia.org/wikipedia/commons/6/6b/Jo%C3%A3o_F%C3%A9lix_2023.jpg",
      stats: { goals: 12, assists: 6 }
    },
    {
      name: "Rafael Leão",
      club: "AC Milan",
      image: "https://upload.wikimedia.org/wikipedia/commons/5/5d/Rafael_Le%C3%A3o_2022.jpg",
      stats: { goals: 15, assists: 13 }
    },
    {
      name: "Pedro Neto",
      club: "Wolves",
      image: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Pedro_Neto_2023.jpg",
      stats: { goals: 6, assists: 7 }
    },
    {
      name: "Francisco Conceição",
      club: "Porto",
      image: "https://upload.wikimedia.org/wikipedia/commons/2/2d/Francisco_Concei%C3%A7%C3%A3o_2023.jpg",
      stats: { goals: 5, assists: 4 }
    },
    {
      name: "Francisco Trincão",
      club: "Sporting",
      image: "https://upload.wikimedia.org/wikipedia/commons/4/4c/Trincao_2023.jpg",
      stats: { goals: 7, assists: 5 }
    },
    {
      name: "Gonçalo Ramos",
      club: "PSG",
      image: "https://upload.wikimedia.org/wikipedia/commons/9/9d/Goncalo_Ramos_2023.jpg",
      stats: { goals: 16, assists: 3 }
    }
  ]
};

function render() {
  const container = document.getElementById("squad");
  container.innerHTML = "";

  Object.keys(squad).forEach(pos => {
    const section = document.createElement("div");
    section.className = "mb-8 bg-zinc-900 p-4 rounded-xl";

    section.innerHTML = `<h2 class='text-2xl text-green-400 mb-4'>${pos}</h2><div class='grid md:grid-cols-3 gap-3'></div>`;

    const grid = section.querySelector("div");

    squad[pos].forEach(p => {
      const btn = document.createElement("button");
      btn.className = "bg-zinc-800 p-3 rounded-xl hover:scale-105 transition text-left";
      btn.innerHTML = `<div class='font-bold'>${p.name}</div><div class='text-gray-400 text-sm'>${p.club}</div>`;
      btn.onclick = () => openPlayer(p);
      grid.appendChild(btn);
    });

    container.appendChild(section);
  });
}

function openPlayer(p) {
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("pimg").src = p.image;
  document.getElementById("pname").innerText = p.name;
  document.getElementById("pclub").innerText = p.club;

  const stats = document.getElementById("stats");
  stats.innerHTML = "";

  Object.keys(p.stats).forEach(k => {
    const div = document.createElement("div");
    div.className = "bg-zinc-800 p-2 rounded";
    div.innerHTML = `<div class='text-gray-400'>${k}</div><div class='text-green-400 font-bold'>${p.stats[k]}</div>`;
    stats.appendChild(div);
  });
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

render();

</script>
</body>
</html>
